
<mat-toolbar>
  <button matIconButton class="example-icon" aria-label="Example icon-button with menu icon">
    <mat-icon>menu</mat-icon>
  </button>
  <span>Book organizer</span>
  <span class="spacer"></span>
  <bo-file-selector (fileSelected)="onFileSelected($event)">
    <button matIconButton class="example-icon favorite-icon" aria-label="Upload xml file" matTooltip="Upload XML file">
      <mat-icon>cloud_upload</mat-icon>
    </button>
  </bo-file-selector>
  <button matIconButton class="example-icon favorite-icon" aria-label="Add book" matTooltip="Add book" (click)="addBook()">
    <mat-icon>add</mat-icon>
  </button>
</mat-toolbar>

<section>
  <!-- Компонент пагінації -->
  <mat-paginator [pageSizeOptions]="[5, 10, 20, 50, 100, 200]" showFirstLastButtons></mat-paginator>

  <div>
    <mat-form-field appearance="outline" class="search-by-title">
      <mat-label>Search</mat-label>
      <input
        matInput
        type="text"
        [formControl]="searchControl"
        placeholder="Enter book title"
      />
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
  </div>
  <table mat-table [dataSource]="dataSource" class="mat-elevation-z8" matSort (matSortChange)="onSortChange($event)">

    <!-- Author Column -->
    <ng-container matColumnDef="author">
      <th mat-header-cell *matHeaderCellDef>Author</th>
      <td mat-cell *matCellDef="let element"> {{element.author}} </td>
    </ng-container>

    <!-- Title Column -->
    <ng-container matColumnDef="title">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Title </th>
      <td mat-cell *matCellDef="let element"> {{element.title}} </td>
    </ng-container>

    <!-- Title Column -->
    <ng-container matColumnDef="pages">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Pages </th>
      <td mat-cell *matCellDef="let element"> {{element.pages}} </td>
    </ng-container>

    <!-- Edit Column -->
    <ng-container matColumnDef="edit">
      <th mat-header-cell *matHeaderCellDef>  </th>
      <td mat-cell *matCellDef="let element">
        <button matIconButton class="example-icon favorite-icon" aria-label="Edit book" matTooltip="Edit book" (click)="editBook(element)">
          <mat-icon>edit</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    <!-- Row shown when there is no matching data. -->
    <tr class="mat-row" *matNoDataRow>
      <td class="mat-cell" colspan="4">No data. Plase upload file  with books or check filter</td>
    </tr>
  </table>
</section>

<section>
  <button class="floating-save-button" matFab aria-label="Save to XML file" matTooltip="Save to XML file" (click)="saveToXml()" [disabled]="!booksCount()">
    <mat-icon>save</mat-icon>
  </button>
</section>
