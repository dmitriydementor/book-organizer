<h2 mat-dialog-title>
  {{ data.isCreate ? 'Add book': 'Edit book' }}
</h2>
<mat-dialog-content>
  <form [formGroup]="form">
    <mat-form-field class="full-width">
      <mat-label>Title</mat-label>
      <input matInput type="text" placeholder="Enter book title" formControlName="title">
    </mat-form-field>

    <mat-form-field class="full-width">
      <mat-label>Author</mat-label>
      <input matInput type="text" placeholder="Enter author" formControlName="author">
    </mat-form-field>

    <mat-form-field class="full-width">
      <mat-label>Pages</mat-label>
      <input matInput type="number" placeholder="Enter amount of pages" formControlName="pages">
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions>
  <button matButton="tonal" mat-dialog-close>Cancel</button>
  <button matButton="filled" [disabled]="!form.valid" (click)="save()">Save</button>
</mat-dialog-actions>
